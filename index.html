<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소리 속력 탐구 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --secondary: #27ae60; --accent: #e67e22;
            --danger: #e74c3c; --bg: #f4f7f9; --card: #ffffff;
        }

        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; padding-bottom: 100px; color: #2c3e50; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .card { background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .card-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .step-num { background: var(--primary); color: white; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }

        .mode-selector { display: flex; background: #eee; padding: 4px; border-radius: 12px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: transparent; color: #7f8c8d; font-size: 1rem; }
        .mode-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        table { width: 100%; border-collapse: collapse; }
        th { font-size: 0.85rem; color: #888; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 8px; text-align: center; }
        input[type="number"] { width: 100%; padding: 12px; border: 2px solid #f1f3f5; border-radius: 10px; text-align: center; font-size: 1rem; }
        
        .manual-focus { background-color: #fff9db; border-color: #fab005 !important; }
        .auto-fill { background-color: #f8f9fa; color: #adb5bd; }
        
        .row-excluded { opacity: 0.3; background-color: #f1f3f5; }
        .btn-exclude { background: #eee; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .btn-exclude.active { background: var(--danger); color: white; }

        .conclusion-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .stat-box { background: #f8f9fa; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
        .guess-box { background: #e8f4fd; border: 2px solid var(--primary); padding: 20px; border-radius: 15px; text-align: center; }

        .reveal-btn { width: 100%; padding: 20px; background: var(--secondary); color: white; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3); }
        .reveal-btn:hover { background: #219150; transform: translateY(-3px); }
        
        #truth-card { display: none; border-top: 5px solid var(--secondary); }

        #calc-toggle { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 1.6rem; cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #calc-popup { display: none; position: fixed; bottom: 110px; right: 30px; width: 280px; background: #1a1a1a; border-radius: 20px; padding: 20px; z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .calc-screen { width: 100%; height: 50px; background: transparent; color: #2ecc71; text-align: right; font-size: 1.6rem; border: none; margin-bottom: 15px; padding: 0 10px; box-sizing: border-box; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-grid button { height: 50px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-size: 2rem;">👨‍🔬 소리 속력 탐구 : 과학자 모드</h1>
        <p style="color: #666;">여러분의 데이터를 믿으세요. 정답은 데이터 속에 있습니다.</p>
    </header>

    <div class="card">
        <div class="card-title"><div class="step-num">1</div> 탐구 기초 설정</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label style="font-size:0.85rem; font-weight:bold; display:block; margin-bottom:8px;">📏 측정 거리 (L, m)</label>
                <input type="number" id="dist-L" value="5" oninput="updateAll()">
            </div>
            <div>
                <label style="font-size:0.85rem; font-weight:bold; display:block; margin-bottom:8px;">🌡️ 실험실 온도 (T, ℃)</label>
                <input type="number" id="temp-T" value="20" oninput="updateAll()">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><div class="step-num">2</div> 관찰 데이터 기록 및 이상치 정제</div>
        <div class="mode-selector">
            <button id="btn-manual" class="mode-btn active" onclick="setMode('manual')">🙋‍♂️ 직접 계산 (수동)</button>
            <button id="btn-auto" class="mode-btn" onclick="setMode('auto')">🤖 데이터 도우미 (자동)</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th width="10%">시행</th><th width="20%">기기 A(s)</th><th width="20%">기기 B(s)</th><th width="20%">시간차(s)</th><th width="20%">속력(m/s)</th><th width="10%">정제</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <button onclick="addRow()" style="width:100%; margin-top:15px; padding:12px; border:2px dashed #ccc; background:none; border-radius:12px; cursor:pointer; color:#888; font-weight:bold;">+ 새로운 시행 데이터 추가</button>
    </div>

    <div class="card">
        <div class="card-title"><div class="step-num">3</div> 데이터 시각화 및 결론 도출</div>
        <div style="height: 350px;"><canvas id="mainChart"></canvas></div>

        <div class="conclusion-area">
            <div class="stat-box">
                <div style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 10px;">📊 정제된 데이터의 평균값</div>
                <div style="font-size: 1.8rem; font-weight: 900; color: var(--secondary);"><span id="avg-v">0</span> <small style="font-size:0.9rem;">m/s</small></div>
            </div>
            <div class="guess-box">
                <div style="font-size: 0.85rem; color: var(--primary); font-weight: bold; margin-bottom: 10px;">🌟 내가 내린 최종 결론은?</div>
                <input type="number" id="student-guess" placeholder="결론 속력 입력" style="font-size: 1.2rem; font-weight: bold;">
            </div>
        </div>

        <button class="reveal-btn" onclick="revealTruth()">탐구 결과 확정 및 과학적 표준과 비교하기</button>
    </div>

    <div id="truth-card" class="card">
        <div class="card-title"><div class="step-num">4</div> 과학적 검증 및 성찰</div>
        <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px;">
            <div style="background: #f8f9fa; padding: 20px; border-radius: 15px; text-align: center;">
                <div style="font-size: 0.85rem; margin-bottom:10px;">현대 과학의 표준 음속 ($v$)</div>
                <div style="font-size: 2rem; font-weight: 900; color: var(--danger);"><span id="theory-v">0</span> <small style="font-size:0.9rem;">m/s</small></div>
                <p style="font-size: 0.75rem; color: #888; margin-top:10px;">($v = 331.5 + 0.6T$ 공식 적용)</p>
            </div>
            <div style="background: #fff5f5; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <div style="font-size: 1rem; font-weight: bold;">나의 탐구 오차율</div>
                <div style="font-size: 2.5rem; font-weight: 900; color: var(--danger);"><span id="error-rate">0</span><small style="font-size:1.2rem;">%</small></div>
            </div>
        </div>
        <div id="final-msg" style="margin-top: 25px; text-align: center; font-weight: 800; font-size: 1.2rem; padding: 15px; border-radius: 10px;"></div>
    </div>
</div>

<button id="calc-toggle" onclick="toggleCalc()">🧮</button>
<div id="calc-popup">
    <input type="text" id="c-display" class="calc-screen" readonly value="0">
    <div class="calc-grid">
        <button style="background:#555; color:white;" onclick="cInput('7')">7</button><button style="background:#555; color:white;" onclick="cInput('8')">8</button><button style="background:#555; color:white;" onclick="cInput('9')">9</button><button style="background:var(--danger); color:white;" onclick="cClear()">C</button>
        <button style="background:#555; color:white;" onclick="cInput('4')">4</button><button style="background:#555; color:white;" onclick="cInput('5')">5</button><button style="background:#555; color:white;" onclick="cInput('6')">6</button><button style="background:var(--accent); color:white;" onclick="cInput('/')">÷</button>
        <button style="background:#555; color:white;" onclick="cInput('1')">1</button><button style="background:#555; color:white;" onclick="cInput('2')">2</button><button style="background:#555; color:white;" onclick="cInput('3')">3</button><button style="background:var(--accent); color:white;" onclick="cInput('*')">×</button>
        <button style="background:#555; color:white;" onclick="cInput('0')">0</button><button style="background:#555; color:white;" onclick="cInput('.')">.</button><button style="background:var(--secondary); color:white;" onclick="cEval()">=</button><button style="background:var(--accent); color:white;" onclick="cInput('-')">-</button>
    </div>
</div>

<script>
    let currentMode = 'manual';
    let chart;
    let isRevealed = false;

    window.onload = () => {
        for(let i=0; i<5; i++) addRow();
        initChart();
    };

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-manual').classList.toggle('active', mode === 'manual');
        document.getElementById('btn-auto').classList.toggle('active', mode === 'auto');
        document.querySelectorAll('.dt-input, .v-input').forEach(el => {
            el.readOnly = (mode === 'auto');
            el.classList.toggle('auto-fill', mode === 'auto');
            el.classList.toggle('manual-focus', mode === 'manual');
        });
        if(mode === 'auto') updateAll();
    }

    function addRow() {
        const tbody = document.getElementById('table-body');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="font-weight:bold; color:#aaa;">${tbody.children.length + 1}</td>
            <td><input type="number" class="tA" step="0.0001" oninput="updateAll()"></td>
            <td><input type="number" class="tB" step="0.0001" oninput="updateAll()"></td>
            <td><input type="number" class="dt-input ${currentMode==='auto'?'auto-fill':'manual-focus'}" oninput="updateAll()" ${currentMode==='auto'?'readonly':''}></td>
            <td><input type="number" class="v-input ${currentMode==='auto'?'auto-fill':'manual-focus'}" oninput="updateAll()" ${currentMode==='auto'?'readonly':''}></td>
            <td><button class="btn-exclude" onclick="toggleExclude(this)">제외</button></td>
        `;
        tbody.appendChild(tr);
    }

    function toggleExclude(btn) {
        const row = btn.parentElement.parentElement;
        row.classList.toggle('row-excluded');
        btn.classList.toggle('active');
        btn.innerText = row.classList.contains('row-excluded') ? '복구' : '제외';
        updateAll();
    }

    function updateAll() {
        const L = parseFloat(document.getElementById('dist-L').value);
        const rows = document.querySelectorAll('#table-body tr');
        let scatterData = [];
        let speeds = [];

        rows.forEach((row, i) => {
            const tA = parseFloat(row.querySelector('.tA').value);
            const tB = parseFloat(row.querySelector('.tB').value);
            const dtEl = row.querySelector('.dt-input');
            const vEl = row.querySelector('.v-input');

            if (currentMode === 'auto' && !isNaN(tA) && !isNaN(tB)) {
                const diff = Math.abs(tA - tB);
                dtEl.value = diff.toFixed(4);
                if (diff > 0) vEl.value = ( (2 * L) / diff ).toFixed(2);
            }

            if (vEl.value && !row.classList.contains('row-excluded')) {
                const val = parseFloat(vEl.value);
                scatterData.push({ x: i + 1, y: val });
                speeds.push(val);
            }
        });

        const avg = speeds.length > 0 ? (speeds.reduce((a,b)=>a+b)/speeds.length).toFixed(2) : "0";
        document.getElementById('avg-v').innerText = avg;
        updateChart(scatterData, speeds);
    }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: '우리의 관찰 데이터 (m/s)',
                    data: [],
                    backgroundColor: 'rgba(44, 62, 80, 0.7)',
                    pointRadius: 8,
                    pointHoverRadius: 12,
                    showLine: false
                }, {
                    label: '과학적 표준 (이론값)',
                    data: [],
                    type: 'line',
                    borderColor: '#e74c3c',
                    borderWidth: 3,
                    borderDash: [10, 5],
                    pointRadius: 0,
                    fill: false,
                    showLine: true,
                    hidden: true // 초기값은 숨김
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear',
                        title: { display: true, text: '시행 차수 (Trial Number)', font: { weight: 'bold' } },
                        min: 0,
                        max: 10,
                        ticks: { stepSize: 1, callback: (v) => (v > 0 && Number.isInteger(v)) ? v : '' }
                    },
                    y: {
                        title: { display: true, text: '속력 (m/s)', font: { weight: 'bold' } },
                        suggestedMin: 300,
                        suggestedMax: 400
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            filter: function(item) {
                                // 진실 확인 전에는 이론값 범례도 숨김
                                if (!isRevealed && item.text === '과학적 표준 (이론값)') return false;
                                return true;
                            }
                        }
                    }
                }
            }
        });
    }

    function updateChart(scatterData, speeds) {
        chart.data.datasets[0].data = scatterData;
        
        // 데이터가 범위를 벗어나면 x축 확장
        const maxIdx = scatterData.length > 0 ? Math.max(...scatterData.map(p => p.x)) : 5;
        chart.options.scales.x.max = Math.max(10, maxIdx + 1);

        if (isRevealed) {
            const T = parseFloat(document.getElementById('temp-T').value);
            const theoryV = 331.5 + (0.6 * T);
            chart.data.datasets[1].data = [{x: 0, y: theoryV}, {x: chart.options.scales.x.max, y: theoryV}];
            chart.data.datasets[1].hidden = false;
        }
        chart.update();
    }

    function revealTruth() {
        const guess = document.getElementById('student-guess').value;
        if (!guess) {
            alert("확인하기 전, 여러분이 탐구하여 내린 최종 결론(속력)을 적어주세요!");
            return;
        }

        isRevealed = true;
        document.getElementById('truth-card').style.display = 'block';
        
        const T = parseFloat(document.getElementById('temp-T').value);
        const theoryV = 331.5 + (0.6 * T);
        const error = (Math.abs(guess - theoryV) / theoryV * 100).toFixed(2);

        document.getElementById('theory-v').innerText = theoryV.toFixed(2);
        document.getElementById('error-rate').innerText = error;

        const msgEl = document.getElementById('final-msg');
        if (error < 1) {
            msgEl.innerText = "🎖️ 역사적인 발견입니다! 현대 과학과 거의 일치하는 정밀한 탐구네요.";
            msgEl.style.backgroundColor = "#eafff0"; msgEl.style.color = "#27ae60";
        } else if (error < 5) {
            msgEl.innerText = "👏 훌륭한 과학자군요! 오차 범위 안에서 소리의 속력을 잘 찾아냈습니다.";
            msgEl.style.backgroundColor = "#f0f9ff"; msgEl.style.color = "#2980b9";
        } else {
            msgEl.innerText = "🧐 오차가 발견되었습니다. 온도, 소음, 혹은 기기 지연 중 어떤 것이 영향을 주었을까요?";
            msgEl.style.backgroundColor = "#fff5f5"; msgEl.style.color = "#e74c3c";
        }

        updateAll();
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // 계산기 로직
    function toggleCalc() { const p = document.getElementById('calc-popup'); p.style.display = (p.style.display==='block'?'none':'block'); }
    function cInput(v) { document.getElementById('c-display').value = (document.getElementById('c-display').value==='0') ? v : document.getElementById('c-display').value + v; }
    function cClear() { document.getElementById('c-display').value = '0'; }
    function cEval() { try { document.getElementById('c-display').value = eval(document.getElementById('c-display').value).toFixed(4); } catch { alert('오류'); } }
</script>

</body>
</html>
